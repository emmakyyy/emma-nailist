<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma's Nailist | Luxury Nail Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #d4a373; 
            --pink-bg: #fce4ec; /* Pink soft sesuai foto */
            --purple-light: #f3e5f5; 
            --text: #4a4a4a;
            --white: #ffffff;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--pink-bg); margin: 0; color: var(--text); scroll-behavior: smooth; }
        
        nav { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; 
            position: sticky; top: 0; display: flex; justify-content: center; gap: 25px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 1000; 
        }
        nav a { text-decoration: none; color: #5e35b1; font-weight: 600; font-size: 12px; letter-spacing: 1px; }

        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        .hero { 
            text-align: center; padding: 100px 20px; 
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('header.jpg'); 
            background-size: cover; background-position: center; border-radius: 40px; 
            margin-bottom: 30px; min-height: 350px; display: flex; flex-direction: column;
            justify-content: center; color: white;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 45px; margin: 0; }

        .card { background: white; padding: 35px 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { 
            font-family: 'Playfair Display', serif; color: #5e35b1; 
            font-size: 24px; border-bottom: 2px solid var(--purple-light); 
            display: inline-block; padding-bottom: 5px; margin-bottom: 25px; 
        }

        .testi-grid { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scroll-snap-type: x mandatory; }
        .testi-item { flex: 0 0 250px; aspect-ratio: 1/1; background: #eee; border-radius: 30px; overflow: hidden; scroll-snap-align: start; }
        .testi-item img { width: 100%; height: 100%; object-fit: cover; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 8px; color: #5e35b1; }
        input, select, textarea { 
            width: 100%; padding: 14px; border: 1px solid #f0f0f0; 
            border-radius: 15px; font-size: 14px; background: #fafafa;
        }

        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-item { background: #fef9ff; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        
        button { 
            width: 100%; padding: 18px; background: #5e35b1; color: white; 
            border: none; border-radius: 50px; font-weight: bold; font-size: 16px; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: #4527a0; transform: scale(1.02); }
    </style>
</head>
<body>

<nav>
    <a href="#home">HOME</a>
    <a href="#testi">CATALOG</a>
    <a href="#booking">BOOKING</a>
    <a href="#lokasi">LOCATION</a>
</nav>

<div class="container">
    <section id="home" class="hero">
        <h1>Emma's Nailist</h1>
        <p>Luxury Nail Art Design & Care</p>
    </section>

    <section id="testi" class="card">
        <h3>✨ Our Catalog</h3>
        <div class="testi-grid">
            <div class="testi-item"><img src="kuku1.jpg" alt="1"></div>
            <div class="testi-item"><img src="kuku2.jpg" alt="2"></div>
            <div class="testi-item"><img src="kuku3.jpg" alt="3"></div>
            <div class="testi-item"><img src="kuku4.jpg" alt="4"></div>
            </div>
    </section>

    <section id="booking" class="card">
        <h3>📅 Booking Form</h3>
        <form id="emmaForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" required placeholder="Masukkan nama kamu">
            </div>

            <div class="form-group">
                <label>Jumlah Orang</label>
                <input type="number" id="jumlahOrang" value="1" min="1">
            </div>

            <div class="form-group">
                <label>Tanggal & Jam</label>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="tanggal" required style="flex:1;">
                    <select id="jam" required style="flex:1;">
                        <option value="09:00">09:00</option>
                        <option value="12:00">12:00</option>
                        <option value="15:00">15:00</option>
                        <option value="18:00">18:00</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Layanan</label>
                <select id="layanan">
                    <option value="Datang ke Toko">Datang ke Toko</option>
                    <option value="Home Service">Home Service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tambah Extension?</label>
                <select id="exten" onchange="toggleExten()">
                    <option value="Tidak">Tidak</option>
                    <option value="Ya">Ya</option>
                </select>
            </div>

            <div id="boxExten" class="form-group" style="display:none;">
                <label>Jenis Extension</label>
                <select id="jenisExten">
                    <option value="Akrilik">Akrilik</option>
                    <option value="Gel/Hard Gel">Gel/Hard Gel</option>
                    <option value="Soft Gel Tips">Soft Gel Tips</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tipe Nail Art</label>
                <select id="tipeArt">
                    <option value="Design Toko">Design Toko (Katalog)</option>
                    <option value="Custom Sendiri">Custom Sendiri</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tambahan Treatment</label>
                <div class="checkbox-grid">
                    <div class="check-item"><input type="checkbox" name="extra" value="Manicure"> Manicure</div>
                    <div class="check-item"><input type="checkbox" name="extra" value="Remover"> Remover</div>
                </div>
            </div>

            <button type="submit" id="submitBtn">CONFIRM BOOKING</button>
        </form>
    </section>

    <section id="lokasi" class="card">
        <h3>📍 Location</h3>
        <p>Perumahan Alamanda Garden No. 103, Batam</p>
        <div style="border-radius:25px; overflow:hidden;">
            <iframe src="https://www.google.com/maps/contrib/113979271529870570816/reviews" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>
</div>

<script>
    // LOGIKA TETAP SAMA (WA & SPREADSHEET)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1OdWr5s-w4vhkLXMcIcJIHuhFyoWSH0weR0a-IvhN2sO2SUdufsej5iu5oRHAlEZUzw/exec';

    document.getElementById('emmaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "PROCESSING...";
        
        let extras = [];
        document.querySelectorAll('input[name="extra"]:checked').forEach(c => extras.push(c.value));

        const payload = {
            nama: document.getElementById('nama').value,
            waktu: document.getElementById('tanggal').value + " " + document.getElementById('jam').value,
            layanan: document.getElementById('layanan').value,
            pakaiExten: document.getElementById('exten').value,
            extras: extras.join(", ")
        };

        // Kirim ke Spreadsheet
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

        // Kirim ke WA
        setTimeout(() => {
            const pesanWA = `Halo Emma's Nailist!%0A*BOOKING BARU*%0A👤 Nama: ${payload.nama}%0A📅 Waktu: ${payload.waktu}%0A📍 Layanan: ${payload.layanan}%0A✨ Tambahan: ${payload.extras}`;
            window.location.href = `https://wa.me/6281918554431?text=${pesanWA}`;
        }, 1000);
    });

    function toggleExten() {
        document.getElementById('boxExten').style.display = (document.getElementById('exten').value === 'Ya') ? 'block' : 'none';
    }
</script>
</body>
</html>
