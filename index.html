<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma's Nailist | Luxury Nail Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main: #d4a373; --bg: #fefae0; --accent: #faedcd; --text: #333; }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--text); scroll-behavior: smooth; }
        
        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); padding: 20px; position: sticky; top: 0; display: flex; justify-content: center; gap: 30px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 1000; }
        nav a { text-decoration: none; color: var(--main); font-weight: 600; font-size: 13px; letter-spacing: 1px; }

        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        .hero { 
            text-align: center; padding: 100px 20px; background-color: var(--main);
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('header.jpg'); 
            background-size: cover; background-position: center; border-radius: 40px; 
            margin-bottom: 30px; min-height: 350px; display: flex; flex-direction: column;
            justify-content: center; color: white;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero p { font-size: 18px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }

        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { font-family: 'Playfair Display', serif; color: var(--main); border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }

        .testi-grid { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scroll-snap-type: x mandatory; }
        .testi-item { flex: 0 0 250px; aspect-ratio: 1/1; background: #eee; border-radius: 25px; overflow: hidden; scroll-snap-align: start; }
        .testi-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; }

        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-item { background: #fafafa; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .check-item input { width: auto; }

        button { width: 100%; padding: 16px; background: var(--main); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #bc6c25; }
        
        option:disabled { color: #cc0000; background-color: #fce4e4; font-style: italic; }
    </style>
</head>
<body>

<nav>
    <a href="#home">HOME</a>
    <a href="#testi">TESTIMONI</a>
    <a href="#booking">BOOKING</a>
    <a href="#lokasi">LOKASI</a>
</nav>

<div class="container">
    <section id="home" class="hero">
        <h1>Emma's Nailist</h1>
        <p>Luxury Nail Art Design & Care</p>
    </section>

    <section id="testi" class="card">
        <h3>✨ Catalog</h3>
        <div class="testi-grid">
            <div class="testi-item"><img src="kuku1.jpg" alt="1"></div>
            <div class="testi-item"><img src="kuku2.jpg" alt="2"></div>
            <div class="testi-item"><img src="kuku3.jpg" alt="3"></div>
            <div class="testi-item"><img src="kuku4.jpg" alt="4"></div>
            <div class="testi-item"><img src="kuku5.jpg" alt="5"></div>
            <div class="testi-item"><img src="kuku6.jpg" alt="6"></div>
            <div class="testi-item"><img src="kuku7.jpg" alt="7"></div>
            <div class="testi-item"><img src="kuku8.jpg" alt="8"></div>
            <div class="testi-item"><img src="kuku9.jpg" alt="9"></div>
            <div class="testi-item"><img src="kuku10.jpg" alt="10"></div>
            <div class="testi-item"><img src="kuku11.jpg" alt="11"></div>
            <div class="testi-item"><img src="kuku12.jpg" alt="12"></div>
            <div class="testi-item"><img src="kuku13.jpg" alt="13"></div>
        </div>
    </section>

    <section id="booking" class="card">
        <h3>📅 Booking Form</h3>
        <form id="emmaForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" required placeholder="Masukkan nama kamu">
            </div>

            <div class="form-group">
                <label>Jumlah Orang</label>
                <input type="number" id="jumlahOrang" value="1" min="1">
            </div>

            <div class="form-group">
                <label>Pilih Tanggal Kedatangan (7 Hari Kedepan)</label>
                <input type="date" id="tanggal" required>
            </div>

            <div class="form-group">
                <label>Pilih Jam</label>
                <select id="jam" required disabled>
                    <option value="">-- Pilih Tanggal Terlebih Dahulu --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Layanan</label>
                <select id="layanan">
                    <option value="Datang ke Toko">Datang ke Toko</option>
                    <option value="Home Service ">Home Service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tambah Extension?</label>
                <select id="exten" onchange="toggleExten()">
                    <option value="Tidak">Tidak</option>
                    <option value="Ya">Ya</option>
                </select>
            </div>

            <div id="boxExten" class="form-group" style="display:none;">
                <label>Jenis Extension</label>
                <select id="jenisExten">
                    <option value="-">-- Pilih Jenis --</option>
                    <option value="Akrilik">Akrilik</option>
                    <option value="Gel/Hard Gel">Gel/Hard Gel</option>
                    <option value="PolyGel">PolyGel</option>
                    <option value="Soft Gel Tips">Soft Gel Tips/Gel-X</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bentuk Kuku (Shape)</label>
                <select id="shape">
                    <option value="Squoval">Squoval</option>
                    <option value="Almond">Almond</option>
                    <option value="Oval">Oval</option>
                    <option value="Square">Square</option>
                    <option value="Coffin">Coffin</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tipe Nail Art</label>
                <select id="tipeArt" onchange="handleTipeArt()">
                    <option value="">-- Pilih Tipe --</option>
                    <option value="Design Toko">Design Toko (Katalog)</option>
                    <option value="French Manicure">French Manicure</option>
                    <option value="Nude Glossy">Nude Glossy</option>
                    <option value="3D Art">3D Art</option>
                    <option value="Cat Eye">Cat Eye</option>
                    <option value="Custom Sendiri">Custom Sendiri (Upload Gambar)</option>
                </select>
            </div>
            
            <div id="boxNoDesain" class="form-group" style="display:none;">
                <label>Pilih Nomor Desain (1-13)</label>
                <select id="noDesain">
                    <option value="-">-- Pilih Nomor --</option>
                    <option value="1">Desain 1</option>
                    <option value="2">Desain 2</option>
                    <option value="3">Desain 3</option>
                    <option value="4">Desain 4</option>
                    <option value="5">Desain 5</option>
                    <option value="6">Desain 6</option>
                    <option value="7">Desain 7</option>
                    <option value="8">Desain 8</option>
                    <option value="9">Desain 9</option>
                    <option value="10">Desain 10</option>
                    <option value="11">Desain 11</option>
                    <option value="12">Desain 12</option>
                    <option value="13">Desain 13</option>
                </select>
            </div>

            <div id="boxCustom" class="form-group" style="display:none;">
                <label>Upload Referensi Gambar</label>
                <input type="file" id="gambarCustom">
            </div>

            <div class="form-group">
                <label>Tambahan Treatment</label>
                <div class="checkbox-grid">
                    <div class="check-item"><input type="checkbox" name="extra" value="Manicure"> Manicure</div>
                    <div class="check-item"><input type="checkbox" name="extra" value="Remover"> Remover</div>
                    <div class="check-item"><input type="checkbox" name="extra" value="Vitamin"> Vitamin</div>
                </div>
            </div>

            <button type="submit" id="submitBtn">KIRIM BOOKING SEKARANG</button>
        </form>
    </section>

    <section id="lokasi" class="card">
        <h3>📍 Lokasi Studio</h3>
        <p>Batam Center, Kepulauan Riau</p>
    </section>
</div>

<script>
    // Pastikan SCRIPT_URL sudah benar
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1OdWr5s-w4vhkLXMcIcJIHuhFyoWSH0weR0a-IvhN2sO2SUdufsej5iu5oRHAlEZUzw/exec'; 

    const inputTanggal = document.getElementById('tanggal');
    const selectJam = document.getElementById('jam');

    const hariIni = new Date();
    const tujuhHariLagi = new Date();
    tujuhHariLagi.setDate(hariIni.getDate() + 7);
    inputTanggal.setAttribute('min', hariIni.toISOString().split('T')[0]);
    inputTanggal.setAttribute('max', tujuhHariLagi.toISOString().split('T')[0]);

    const semuaJam = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

    inputTanggal.addEventListener('change', function() {
        const tgl = this.value;
        if (!tgl) return;

        selectJam.innerHTML = '<option>Mengecek ketersediaan...</option>';
        selectJam.disabled = true;

        fetch(`${SCRIPT_URL}?tanggal=${tgl}&v=${Math.random()}`)
            .then(res => res.json())
            .then(bookedSlots => {
                let html = '<option value="">-- Pilih Jam --</option>';
                semuaJam.forEach(j => {
                    const isFull = bookedSlots.some(slot => slot.includes(j));
                    if (isFull) {
                        html += `<option value="${j}" disabled style="color:red;">${j} (SUDAH DIPESAN)</option>`;
                    } else {
                        html += `<option value="${j}">${j}</option>`;
                    }
                });
                selectJam.innerHTML = html;
                selectJam.disabled = false;
            })
            .catch(() => {
                let html = '<option value="">-- Pilih Jam --</option>';
                semuaJam.forEach(j => html += `<option value="${j}">${j}</option>`);
                selectJam.innerHTML = html;
                selectJam.disabled = false;
            });
    });

    document.getElementById('emmaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "SEDANG MEMPROSES...";
        btn.disabled = true;

        let extras = [];
        document.querySelectorAll('input[name="extra"]:checked').forEach(c => extras.push(c.value));

        // Format waktu agar sama dengan Spreadsheet
        const formatWaktu = `${inputTanggal.value} Pukul ${selectJam.value}`;

        const payload = {
            nama: document.getElementById('nama').value,
            jumlahOrang: document.getElementById('jumlahOrang').value,
            waktu: formatWaktu, 
            layanan: document.getElementById('layanan').value,
            pakaiExten: document.getElementById('exten').value,
            jenisExten: document.getElementById('jenisExten').value,
            shape: document.getElementById('shape').value,
            style: document.getElementById('tipeArt').value,
            noDesain: document.getElementById('noDesain').value, 
            extras: extras.join(", ")
        };

        // Kirim ke Google Sheets
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

        // Arahkan ke WhatsApp dengan format rapi
        setTimeout(() => {
            const pesanWA = `Halo Emma's Nailist!%0A%0A` +
                            `*DETAIL BOOKING BARU*%0A` +
                            `--------------------------%0A` +
                            `👤 *Nama:* ${payload.nama}%0A` +
                            `👥 *Jumlah:* ${payload.jumlahOrang} Orang%0A` +
                            `📅 *Waktu:* ${payload.waktu}%0A` +
                            `📍 *Layanan:* ${payload.layanan}%0A` +
                            `✨ *Style:* ${payload.style}%0A` +
                            `${payload.noDesain !== "-" ? "🔢 *No. Desain:* "+payload.noDesain+"%0A" : ""}` +
                            `💅 *Shape:* ${payload.shape}%0A` +
                            `➕ *Extension:* ${payload.pakaiExten} (${payload.jenisExten})%0A` +
                            `📝 *Tambahan:* ${payload.extras || "-"}%0A` +
                            `--------------------------%0A` +
                            `Mohon konfirmasinya ya, terima kasih! ✨`;

            window.location.href = `https://wa.me/6281918554431?text=${pesanWA}`;
            
            alert("Booking berhasil! Mengalihkan ke WhatsApp...");
            btn.innerText = "KIRIM BOOKING SEKARANG";
            btn.disabled = false;
            document.getElementById('emmaForm').reset();
            resetTampilan();
        }, 1500);
    });

    function toggleExten() {
        document.getElementById('boxExten').style.display = (document.getElementById('exten').value === 'Ya') ? 'block' : 'none';
    }
    function handleTipeArt() {
        const tipe = document.getElementById('tipeArt').value;
        document.getElementById('boxNoDesain').style.display = (tipe === 'Design Toko') ? 'block' : 'none';
        document.getElementById('boxCustom').style.display = (tipe === 'Custom Sendiri') ? 'block' : 'none';
    }
    function resetTampilan() {
        document.getElementById('boxExten').style.display = 'none';
        document.getElementById('boxNoDesain').style.display = 'none';
        document.getElementById('boxCustom').style.display = 'none';
        selectJam.disabled = true;
        selectJam.innerHTML = '<option value="">-- Pilih Tanggal Terlebih Dahulu --</option>';
    }
</script>
</body>
</html>
